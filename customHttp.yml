customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
  - pattern: '/sitemap.xml'
    headers:
      - key: 'Content-Type'
        value: 'application/xml; charset=utf-8'
  - pattern: '/robots.txt'
    headers:
      - key: 'Content-Type'
        value: 'text/plain; charset=utf-8'
  - pattern: '/llms.txt'
    headers:
      - key: 'Content-Type'
        value: 'text/plain; charset=utf-8'
      - key: 'Access-Control-Allow-Origin'
        value: '*'
